  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"nl\"><head>\n<meta charset=\"utf-8\">\n<title>myFaro — Module one-pager (template)<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=794\">\n<!--\n  ============================================================================\n  myFaro — MODULE ONE-PAGER TEMPLATE  (Register A · advisor · NL)\n  ----------------------------------------------------------------------------\n  Basis-template voor toekomstige product/module one-pagers.\n  Vervang de voorbeeldtekst (pensioenadvies / 80%-tool) per module.\n  Stijl komt volledig uit template.css + colors_and_type.css — niets hardcoden.\n\n  STRUCTUUR (verwijder secties die je niet nodig hebt):\n    1. Header        — logo + kicker (module-label)\n    2. Titel + sub   — outcome-led titel, één regel belofte\n    3. Intro         — \"de uitdaging\" + \"de shift met myFaro\"  (.two)\n    4. Flow          — 4 stappen                                (.flow)\n    5. Features      — checklist, 6-8 items                     (.checks)\n    6. Toepassingen  — 3 use-case kaarten                       (.cases)\n    7. Stat-strip    — 3 cijfers/claims                         (.stats)\n    8. Impact + pos. — business impact + positionering          (.two)\n    9. CTA-footer    — brand-line + actie\n\n  COPY-REGELS (zie design system):\n    · Spreek de adviseur aan met \"u\". Outcome-led, geen feature-opsomming.\n    · Start van de pijn, dan de oplossing. Inspirerend, niet salesy.\n    · Geen emoji. Euro met vaste spatie: € 420.000. Tabular figures.\n  ============================================================================\n-->\n<style>/* myFaro marketing templates — shared print/screen styles */\n/* ==========================================================================\n   myFaro Design System — Colors & Type\n   Single source of truth. Import this file before any product styles.\n   ========================================================================== */\n\n/* ---------- Fonts: Gotham (geometric sans, ITC Gotham family) ------------ */\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"8456b21f-e8de-4719-8f2b-d5c46836ea1c\") format(\"opentype\");\n  font-weight: 100;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"cae3ac20-7c0e-4e77-b9e1-0436084456dc\") format(\"opentype\");\n  font-weight: 200;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"1c78192d-4a41-4132-929f-9c302ed30509\") format(\"opentype\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"./fonts/GothamLightItalic.ttf\") format(\"truetype\");\n  font-weight: 300;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"179b0f3b-1435-4125-8e17-7282c2848723\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"d377a6ee-b9ce-4f63-ac13-e9a106c8dc34\") format(\"opentype\");\n  font-weight: 400;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"a7737ad5-2308-4ef0-b7f4-32ef9fd7a0ed\") format(\"truetype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"./fonts/GothamMediumItalic.ttf\") format(\"truetype\");\n  font-weight: 500;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"ecae211a-14f3-4e06-bcde-4456c4e5648f\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"./fonts/GothamBoldItalic.ttf\") format(\"truetype\");\n  font-weight: 700;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"40d1a06d-0ad8-4aa4-b115-efd2be1ffe30\") format(\"opentype\");\n  font-weight: 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ------------------------------------------------------------------ */\n  /* Brand colors — from the official Brand Identity Guidelines v1.0     */\n  /* ------------------------------------------------------------------ */\n  --color-sea-blue:      #006EFD;  /* PRIMARY  — UI, links, primary CTAs */\n  --color-marine-blue:   #1E2442;  /* SECONDARY — depth, headers, nav    */\n  --color-fire-red:      #EE4339;  /* ACCENT    — limited use, alerts    */\n  --color-abyssal-black: #131313;  /* BODY TEXT & BACKGROUND             */\n  --color-white:         #FFFFFF;\n\n  /* Sea Blue tints/shades (oklch-derived, harmonious with #006EFD) */\n  --color-sea-blue-50:   #EBF2FF;\n  --color-sea-blue-100:  #D6E4FE;\n  --color-sea-blue-200:  #ADC9FD;\n  --color-sea-blue-300:  #7FAAFD;\n  --color-sea-blue-400:  #4D8CFD;\n  --color-sea-blue-500:  #006EFD;  /* base */\n  --color-sea-blue-600:  #005AD1;\n  --color-sea-blue-700:  #0046A5;\n  --color-sea-blue-800:  #00347A;\n  --color-sea-blue-900:  #001F4D;\n\n  /* Marine Blue scale */\n  --color-marine-50:     #F2F3F7;\n  --color-marine-100:    #E2E4EC;\n  --color-marine-200:    #C2C6D6;\n  --color-marine-300:    #8E95B0;\n  --color-marine-400:    #5A6388;\n  --color-marine-500:    #3A4263;\n  --color-marine-600:    #2A3151;\n  --color-marine-700:    #1E2442;   /* base */\n  --color-marine-800:    #161B33;\n  --color-marine-900:    #0E1224;\n\n  /* Neutral / \"Mist\" — cool grays, slightly blue-cast */\n  --color-neutral-0:     #FFFFFF;\n  --color-neutral-50:    #FAFBFC;\n  --color-neutral-100:   #F4F5F8;\n  --color-neutral-150:   #ECEEF2;   /* divider on white */\n  --color-neutral-200:   #E2E5EB;\n  --color-neutral-300:   #C9CED8;\n  --color-neutral-400:   #9098A8;\n  --color-neutral-500:   #6A7385;\n  --color-neutral-600:   #4B5468;\n  --color-neutral-700:   #333B4E;\n  --color-neutral-800:   #1F2638;\n  --color-neutral-900:   #131313;\n\n  /* Semantic — financial / operational states */\n  --color-success:       #1F9D6A;   /* green-cyan, calm, non-festive   */\n  --color-success-bg:    #E6F4EE;\n  --color-warning:       #C97A18;   /* amber, used sparingly           */\n  --color-warning-bg:    #FBF1E1;\n  --color-danger:        #EE4339;   /* === fire red, very limited      */\n  --color-danger-bg:     #FCEBEA;\n  --color-info:          #006EFD;   /* === sea blue                    */\n  --color-info-bg:       #EBF2FF;\n\n  /* ------------------------------------------------------------------ */\n  /* Semantic foreground / background tokens (LIGHT MODE — DEFAULT)      */\n  /* ------------------------------------------------------------------ */\n  --bg:           var(--color-neutral-0);    /* page background        */\n  --bg-subtle:    var(--color-neutral-50);   /* zebra / hover surface  */\n  --bg-muted:     var(--color-neutral-100);  /* secondary surface      */\n  --bg-inset:     var(--color-neutral-150);  /* sunken inputs/code     */\n  --bg-elevated:  var(--color-neutral-0);    /* cards (uses border)    */\n  --bg-inverse:   var(--color-marine-700);   /* dark sections on white */\n\n  --fg-1:         var(--color-abyssal-black); /* primary body/headings */\n  --fg-2:         var(--color-neutral-700);   /* secondary text        */\n  --fg-3:         var(--color-neutral-500);   /* tertiary / metadata   */\n  --fg-4:         var(--color-neutral-400);   /* placeholder / disabled*/\n  --fg-on-inverse: var(--color-neutral-0);\n  --fg-on-brand:   var(--color-neutral-0);\n  --fg-link:       var(--color-sea-blue);\n  --fg-link-hover: var(--color-sea-blue-700);\n\n  /* Borders & dividers — THIN is part of the brand */\n  --border-1:     #E5E8EE;   /* default thin divider                  */\n  --border-2:     #D3D8E0;   /* card border, input border             */\n  --border-3:     #B6BDC9;   /* focused or hovered border             */\n  --border-strong: var(--color-marine-700);\n\n  --divider:      #ECEEF2;   /* horizontal rules between rows         */\n  --divider-strong: #D3D8E0;\n\n  /* Brand surfaces */\n  --brand:         var(--color-sea-blue);\n  --brand-hover:   var(--color-sea-blue-600);\n  --brand-press:   var(--color-sea-blue-700);\n  --brand-subtle:  var(--color-sea-blue-50);\n\n  /* ------------------------------------------------------------------ */\n  /* Typography                                                          */\n  /* ------------------------------------------------------------------ */\n  --font-sans: \"Gotham\", \"Montserrat\", \"Inter\", -apple-system, BlinkMacSystemFont,\n               \"Segoe UI\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", \"SF Mono\", ui-monospace, \"Roboto Mono\",\n               Consolas, \"Liberation Mono\", Menlo, monospace;\n\n  /* Weights — Gotham proper names */\n  --fw-thin:    100;\n  --fw-xlight:  200;\n  --fw-light:   300;\n  --fw-book:    400;\n  --fw-medium:  500;\n  --fw-bold:    700;\n  --fw-black:   900;\n\n  /* Type scale — geometric, tight at the top */\n  --fs-display: 64px;   /* hero, marketing only */\n  --fs-h1:      40px;\n  --fs-h2:      32px;\n  --fs-h3:      24px;\n  --fs-h4:      20px;\n  --fs-h5:      16px;\n  --fs-body:    15px;   /* default product body */\n  --fs-body-lg: 17px;\n  --fs-small:   13px;\n  --fs-micro:   11px;   /* labels, eyebrow, metadata */\n\n  --lh-tight:   1.1;\n  --lh-snug:    1.25;\n  --lh-base:    1.5;\n  --lh-relaxed: 1.65;\n\n  --ls-tight:   -0.02em;\n  --ls-snug:    -0.01em;\n  --ls-base:    0em;\n  --ls-wide:    0.04em;     /* eyebrow / micro labels (UPPERCASE) */\n  --ls-wider:   0.12em;     /* \"SECTION TITLE\" style              */\n\n  /* ------------------------------------------------------------------ */\n  /* Spacing — 4px base, used as multipliers                             */\n  /* ------------------------------------------------------------------ */\n  --space-0:   0px;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ------------------------------------------------------------------ */\n  /* Radii — minimal, infrastructure feel. Small rounding only.          */\n  /* ------------------------------------------------------------------ */\n  --radius-none: 0px;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;       /* default buttons, inputs, cards        */\n  --radius-lg:   10px;      /* large cards, modals                   */\n  --radius-xl:   16px;      /* hero panels                           */\n  --radius-pill: 9999px;\n\n  /* ------------------------------------------------------------------ */\n  /* Shadows — subtle, NEVER puffy. Infrastructure ≠ skeuomorphism.     */\n  /* ------------------------------------------------------------------ */\n  --shadow-none:    none;\n  --shadow-flat:    0 0 0 1px var(--border-1);\n  --shadow-xs:      0 1px 2px rgba(19, 25, 60, 0.04), 0 0 0 1px rgba(19, 25, 60, 0.04);\n  --shadow-sm:      0 1px 3px rgba(19, 25, 60, 0.06), 0 0 0 1px rgba(19, 25, 60, 0.05);\n  --shadow-md:      0 4px 12px rgba(19, 25, 60, 0.06), 0 0 0 1px rgba(19, 25, 60, 0.05);\n  --shadow-lg:      0 12px 32px rgba(19, 25, 60, 0.10), 0 0 0 1px rgba(19, 25, 60, 0.05);\n  --shadow-focus:   0 0 0 3px rgba(0, 110, 253, 0.22);\n\n  /* ------------------------------------------------------------------ */\n  /* Motion — calm and operational. No bounces.                          */\n  /* ------------------------------------------------------------------ */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1);     /* default */\n  --ease-emphasis: cubic-bezier(0.3, 0, 0, 1);     /* enter   */\n  --ease-exit:     cubic-bezier(0.4, 0, 1, 1);     /* exit    */\n  --dur-fast:    120ms;\n  --dur-base:    180ms;\n  --dur-slow:    280ms;\n\n  /* ------------------------------------------------------------------ */\n  /* Z-index                                                             */\n  /* ------------------------------------------------------------------ */\n  --z-base:    0;\n  --z-raised:  10;\n  --z-sticky:  100;\n  --z-overlay: 1000;\n  --z-modal:   1100;\n  --z-toast:   1200;\n}\n\n/* ============ Semantic element styles — direct-use defaults ============= */\nhtml, body {\n  font-family: var(--font-sans);\n  font-size:   var(--fs-body);\n  line-height: var(--lh-base);\n  color:       var(--fg-1);\n  background:  var(--bg);\n  font-weight: var(--fw-book);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1, h2, .h2, h3, .h3, h4, .h4, h5, .h5 {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  margin: 0;\n  text-wrap: balance;\n}\nh1, .h1 { font-size: var(--fs-h1); }\nh2, .h2 { font-size: var(--fs-h2); letter-spacing: var(--ls-snug); }\nh3, .h3 { font-size: var(--fs-h3); font-weight: var(--fw-medium); letter-spacing: var(--ls-snug); }\nh4, .h4 { font-size: var(--fs-h4); font-weight: var(--fw-medium); letter-spacing: 0; }\nh5, .h5 { font-size: var(--fs-h5); font-weight: var(--fw-medium); }\n\n.display     { font-size: var(--fs-display); font-weight: var(--fw-bold); letter-spacing: -0.025em; line-height: 1.05; }\n.eyebrow     { font-size: var(--fs-micro); font-weight: var(--fw-medium); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--fg-3); }\n.section-tag { font-size: 11px; font-weight: var(--fw-medium); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--brand); }\n\np { margin: 0 0 var(--space-3); color: var(--fg-2); text-wrap: pretty; }\np.lead { font-size: var(--fs-body-lg); color: var(--fg-1); }\n\na {\n  color: var(--fg-link);\n  text-decoration: none;\n  transition: color var(--dur-fast) var(--ease-standard);\n}\na:hover { color: var(--fg-link-hover); text-decoration: underline; text-underline-offset: 3px; }\n\ncode, kbd, samp, pre, .mono, .num {\n  font-family: var(--font-mono);\n  font-feature-settings: \"tnum\" 1, \"ss01\" 1;\n}\n.num { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1; }\n\nhr {\n  border: 0;\n  border-top: 1px solid var(--divider);\n  margin: var(--space-6) 0;\n}\n\n::selection { background: var(--color-sea-blue-100); color: var(--color-marine-900); }\n\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody { background: #E9ECF2; font-family: var(--font-sans); color: var(--color-marine-700); }\n\n/* A4 sheet */\n.sheet {\n  width: 794px;            /* A4 @96dpi */\n  min-height: 1123px;\n  margin: 24px auto;\n  background: #fff;\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  box-shadow: 0 8px 40px rgba(19,25,60,0.16);\n  overflow: hidden;\n}\n\n.pad { padding: 52px 56px; }\n\n/* Header */\n.op-head { display: flex; align-items: center; justify-content: space-between; }\n.op-head .logo { height: 30px; }\n.op-head .logo svg { height: 30px; width: auto; display: block; }\n.op-head .kicker { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-sea-blue); font-weight: 600; }\n\nh1.op-title { font-size: 34px; line-height: 1.08; letter-spacing: -0.025em; color: var(--color-marine-700); font-weight: 700; margin: 22px 0 0; max-width: 92%; text-wrap: balance; }\n.op-sub { font-size: 16px; line-height: 1.45; color: var(--color-sea-blue); font-weight: 500; margin-top: 12px; }\n.op-lede { font-size: 14px; line-height: 1.55; color: var(--fg-2); margin-top: 8px; max-width: 90%; }\n\n.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-sea-blue); font-weight: 600; }\n.block-h { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: var(--color-marine-700); margin: 0 0 10px; }\n.body { font-size: 13.5px; line-height: 1.6; color: var(--fg-2); }\n.body b, .body strong { color: var(--color-marine-700); font-weight: 600; }\n\nhr.rule { border: 0; border-top: 1px solid var(--divider); margin: 0; }\n\n/* Problem / shift two-up */\n.two { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }\n.shift { background: var(--color-sea-blue-50); border-radius: 12px; padding: 22px 24px; }\n.shift .block-h { color: var(--color-sea-blue-700); }\n\n/* Flow band */\n.flow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border-1); border-radius: 12px; overflow: hidden; }\n.flow .step { padding: 18px 16px; border-right: 1px solid var(--border-1); position: relative; }\n.flow .step:last-child { border-right: 0; }\n.flow .num { width: 26px; height: 26px; border-radius: 50%; background: var(--color-sea-blue); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); }\n.flow .st-h { font-size: 13.5px; font-weight: 700; color: var(--color-marine-700); margin: 12px 0 4px; }\n.flow .st-b { font-size: 11.5px; line-height: 1.4; color: var(--fg-3); }\n.flow .arrow { position: absolute; right: -8px; top: 26px; z-index: 2; color: var(--color-sea-blue); background: #fff; border-radius: 50%; }\n\n/* Feature checklists */\n.checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 28px; }\n.check { display: flex; gap: 10px; align-items: flex-start; font-size: 12.5px; line-height: 1.4; color: var(--fg-1); padding: 5px 0; }\n.check .tick { color: var(--color-sea-blue); flex-shrink: 0; margin-top: 1px; }\n\n/* Stat strip */\n.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n.stat { border: 1px solid var(--border-1); border-radius: 10px; padding: 16px 18px; }\n.stat .v { font-size: 26px; font-weight: 700; color: var(--color-sea-blue); font-family: var(--font-mono); font-feature-settings: \"tnum\"; letter-spacing: -0.02em; }\n.stat .l { font-size: 11.5px; color: var(--fg-3); margin-top: 4px; line-height: 1.35; }\n\n/* CTA footer */\n.op-foot { margin-top: auto; background: var(--color-marine-700); color: #fff; padding: 26px 56px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }\n.op-foot .claim { font-size: 16px; font-weight: 500; max-width: 60%; line-height: 1.4; }\n.op-foot .claim b { color: #7FAAFD; font-weight: 700; }\n.op-foot .cta { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }\n.op-foot .btn { background: var(--color-sea-blue); color: #fff; border-radius: 8px; padding: 12px 20px; font-size: 13.5px; font-weight: 600; white-space: nowrap; }\n.op-foot .url { font-size: 12px; color: rgba(255,255,255,0.7); }\n\n@media print {\n  body { background: #fff; }\n  .sheet { margin: 0; box-shadow: none; width: 100%; min-height: 100vh; }\n  @page { size: A4; margin: 0; }\n}\n<\u002Fstyle>\n<script src=\"64acef2d-2ea2-4f52-ae47-29613e31cfd4\"><\u002Fscript>\n<style>\n  /* Lockup — identiek aan de andere one-pagers */\n  .lockup { display: inline-flex; align-items: center; gap: 9px; }\n  .lockup .mk { width: 30px; height: 30px; }\n  .lockup .wm { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }\n  .lockup .wm .my { color: #131313; }\n  .lockup .wm .faro { color: #006EFD; }\n\n  /* Use-case kaarten (niet in template.css — alleen voor deze template) */\n  .cases { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  .case { border: 1px solid var(--border-1); border-radius: 10px; padding: 18px 18px 20px; }\n  .case .ic { display: flex; width: 34px; height: 34px; border-radius: 8px; background: var(--color-sea-blue-50); color: var(--color-sea-blue); align-items: center; justify-content: center; margin-bottom: 12px; }\n  .case .h { font-size: 13.5px; font-weight: 700; color: var(--color-marine-700); margin-bottom: 5px; }\n  .case .b { font-size: 12px; line-height: 1.5; color: var(--fg-3); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"sheet\">\n  <div class=\"pad\">\n\n    <!-- 1 · HEADER ───────────────────────────────────────────────────────── -->\n    <div class=\"op-head\">\n      <span class=\"lockup\">\n        <span class=\"mk\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n            <path d=\"M29.8116 21.2221C29.9355 20.4767 30 19.7113 30 18.9309C30 18.2903 29.9565 17.6597 29.8724 17.042L22.354 16.1237C22.0579 16.0876 21.837 15.835 21.8418 15.5382L21.8434 15.44C21.8481 15.152 22.0643 14.911 22.3513 14.8738L29.0975 13.9994C27.0963 8.73957 21.987 5 16 5C8.26801 5 2 11.2371 2 18.9309C2 19.4847 2.03247 20.0309 2.09561 20.5677C2.20784 20.5332 2.3218 20.4997 2.4375 20.4671C4.10511 19.9969 6.56576 21.5552 9.22803 23.2412C9.83879 23.628 10.4602 24.0215 11.085 24.3987L11.2932 18.5993C11.3086 18.1691 11.5578 17.8005 11.9167 17.6127V13.6615C11.9167 13.4583 11.9167 13.1667 12.0625 13.0208C12.2083 12.875 15.3265 10.263 15.3265 10.263C15.5457 10.0741 15.871 10.0741 16.0902 10.263C16.0902 10.263 19.2083 12.875 19.3542 13.0208C19.5 13.1667 19.5 13.4583 19.5 13.6615V17.6127C19.8589 17.8005 20.1081 18.1691 20.1236 18.5993L20.3736 25.5648C20.379 25.7177 20.3546 25.8646 20.3055 26C21.5455 25.4508 22.8587 24.6798 24.1668 23.9119C26.1514 22.7468 28.1241 21.5886 29.8116 21.2221Z\" fill=\"#006EFD\"><\u002Fpath>\n            <path d=\"M13.375 15.158C13.375 14.5168 13.8973 13.9971 14.5417 13.9971H16.875C17.5193 13.9971 18.0417 14.5168 18.0417 15.158V17.4798H13.375V15.158Z\" fill=\"#006EFD\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"wm\"><span class=\"my\">my<\u002Fspan><span class=\"faro\">Faro<\u002Fspan><\u002Fspan>\n      <\u002Fspan>\n      <!-- Kicker = module-label, UPPERCASE -->\n      <span class=\"kicker\">Module · Pensioenadvies<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- 2 · TITEL + SUB ──────────────────────────────────────────────────── -->\n    <h1 class=\"op-title\">Efficiënt pensioenadvies met meer impact.<\u002Fh1>\n    <div class=\"op-sub\">Van losse berekeningen naar één geautomatiseerde flow — ongeacht maatschappij of productvorm.<\u002Fdiv>\n\n    <div style=\"height: 28px\"><\u002Fdiv>\n\n    <!-- 3 · INTRO: uitdaging → shift ─────────────────────────────────────── -->\n    <div class=\"two\">\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:8px\">De uitdaging vandaag<\u002Fdiv>\n        <div class=\"body\">\n          De 80%-regel correct toepassen is vandaag een tijdrovende puzzel. Elke\n          maatschappij werkt met andere datastandaarden, manuele berekeningen\n          leiden tot fouten en gemiste kansen. <b>Tijdverlies, fouten en gemiste\n          business.<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"shift\">\n        <div class=\"block-h\">De shift met myFaro<\u002Fdiv>\n        <div class=\"body\">\n          myFaro is het <b>enige platform<\u002Fb> dat dit proces volledig\n          automatiseert — ongeacht maatschappij of productvorm. Van voorbereiding\n          naar het juiste adviesmoment, in één flow.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height: 30px\"><\u002Fdiv>\n\n    <!-- 4 · FLOW (4 stappen) ─────────────────────────────────────────────── -->\n    <div class=\"eyebrow\" style=\"margin-bottom:12px\">Hoe het werkt<\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"step\">\n        <div class=\"num\">1<\u002Fdiv>\n        <div class=\"st-h\">Data ophalen<\u002Fdiv>\n        <div class=\"st-b\">Rechtstreeks bij maatschappijen, zonder dubbele input.<\u002Fdiv>\n        <span class=\"arrow\"><i data-lucide=\"chevron-right\" style=\"width:16px;height:16px;stroke-width:2.2\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">2<\u002Fdiv>\n        <div class=\"st-h\">Automatische berekening<\u002Fdiv>\n        <div class=\"st-b\">De 80%-regel correct toegepast op elk dossier.<\u002Fdiv>\n        <span class=\"arrow\"><i data-lucide=\"chevron-right\" style=\"width:16px;height:16px;stroke-width:2.2\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">3<\u002Fdiv>\n        <div class=\"st-h\">Inzicht &amp; detectie<\u002Fdiv>\n        <div class=\"st-b\">Ontbrekende gegevens en optimalisatiekansen, proactief.<\u002Fdiv>\n        <span class=\"arrow\"><i data-lucide=\"chevron-right\" style=\"width:16px;height:16px;stroke-width:2.2\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">4<\u002Fdiv>\n        <div class=\"st-h\">Actie &amp; advies<\u002Fdiv>\n        <div class=\"st-b\">Klant keurt voorstellen digitaal goed in het platform.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height: 30px\"><\u002Fdiv>\n\n    <!-- 5 · FEATURES (checklist, 6-8) ────────────────────────────────────── -->\n    <div class=\"eyebrow\" style=\"margin-bottom:14px\">Kernfunctionaliteiten<\u002Fdiv>\n    <div class=\"checks\">\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Automatische berekening van de 80%-regel, ongeacht maatschappij<\u002Fdiv>\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Dashboard dat wijst op ontbrekende gegevens of kansen<\u002Fdiv>\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Diepgaande analyse per klantdossier, alles op één plek<\u002Fdiv>\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Simuleer effect van loon, looptijd of extra stortingen<\u002Fdiv>\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Per klant ziet u wat nog moet gebeuren en welke acties mogelijk zijn<\u002Fdiv>\n      <div class=\"check\"><span class=\"tick\"><i data-lucide=\"check\" style=\"width:15px;height:15px;stroke-width:2.5\"><\u002Fi><\u002Fspan>Klant keurt voorstellen digitaal goed — direct in het platform<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height: 30px\"><\u002Fdiv>\n\n    <!-- 6 · TOEPASSINGSGEBIEDEN (3 kaarten) ──────────────────────────────── -->\n    <div class=\"eyebrow\" style=\"margin-bottom:14px\">Toepassingsgebieden<\u002Fdiv>\n    <div class=\"cases\">\n      <div class=\"case\">\n        <span class=\"ic\"><i data-lucide=\"search\" style=\"width:18px;height:18px;stroke-width:2\"><\u002Fi><\u002Fspan>\n        <div class=\"h\">Nazicht bestaande dossiers<\u002Fdiv>\n        <div class=\"b\">Screen IPT-contracten en detecteer suboptimale of slapende dossiers.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <span class=\"ic\"><i data-lucide=\"user-plus\" style=\"width:18px;height:18px;stroke-width:2\"><\u002Fi><\u002Fspan>\n        <div class=\"h\">Nieuwe klanten &amp; leads<\u002Fdiv>\n        <div class=\"b\">Toon direct het optimalisatiepotentieel en versterk uw meerwaarde als adviseur.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <span class=\"ic\"><i data-lucide=\"users\" style=\"width:18px;height:18px;stroke-width:2\"><\u002Fi><\u002Fspan>\n        <div class=\"h\">Samenwerking in één platform<\u002Fdiv>\n        <div class=\"b\">Ondersteunt samenwerking tussen makelaar en accountant, gedeeld en transparant.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height: 30px\"><\u002Fdiv>\n\n    <!-- 7 · STAT-STRIP ───────────────────────────────────────────────────── -->\n    <div class=\"stats\">\n      <div class=\"stat\"><div class=\"v\">0×<\u002Fdiv><div class=\"l\">herinvoer van data — alles is er al<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"v\">realtime<\u002Fdiv><div class=\"l\">berekening, altijd up-to-date per dossier<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"v\">1<\u002Fdiv><div class=\"l\">platform voor analyse, advies &amp; actie<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height: 30px\"><\u002Fdiv>\n    <hr class=\"rule\">\n    <div style=\"height: 24px\"><\u002Fdiv>\n\n    <!-- 8 · BUSINESS IMPACT + POSITIONERING ──────────────────────────────── -->\n    <div class=\"two\" style=\"align-items:stretch\">\n      <div>\n        <div class=\"block-h\" style=\"font-size:15px\">Business impact<\u002Fdiv>\n        <div class=\"body\">\n          Met myFaro wordt pensioenadvies geen losse administratieve taak meer,\n          maar een gecontroleerd en schaalbaar proces. U bespaart manueel werk,\n          verhoogt de datakwaliteit en creëert meer relevante contactmomenten\n          met klanten.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"shift\" style=\"background:var(--color-neutral-100)\">\n        <div class=\"block-h\" style=\"font-size:15px; color:var(--color-marine-700)\">Positionering<\u002Fdiv>\n        <div class=\"body\">\n          myFaro is <b>geen losse rekentool<\u002Fb>. Het is de laag waarop financieel\n          advies gebeurt — data, analyse en actie komen samen. Van inzicht naar\n          actie. <b>Van actie naar gemoedsrust.<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- 9 · CTA-FOOTER ─────────────────────────────────────────────────────── -->\n  <div class=\"op-foot\">\n    <div class=\"claim\">We bring back the <b>fun<\u002Fb> in financial advice.<\u002Fdiv>\n    <div class=\"cta\">\n      <span class=\"btn\">Plan een vrijblijvend verkenningsgesprek<\u002Fspan>\n      <span class=\"url\">www.myfaro.be · info@myfaro.be<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  lucide.createIcons();\n<\u002Fscript>
